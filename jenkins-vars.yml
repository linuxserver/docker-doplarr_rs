---
# jenkins variables
project_name: docker-doplarr_rs
external_type: github_stable
release_type: stable
release_tag: latest
ls_branch: main
repo_vars:
  - EXT_GIT_BRANCH = 'main'
  - EXT_USER = 'activexray'
  - EXT_REPO = 'doplarr_rs'
  - BUILD_VERSION_ARG = 'DOPLARR_RS_RELEASE'
  - LS_USER = 'linuxserver'
  - LS_REPO = 'docker-doplarr_rs'
  - CONTAINER_NAME = 'doplarr_rs'
  - DOCKERHUB_IMAGE = 'linuxserver/doplarr_rs'
  - DEV_DOCKERHUB_IMAGE = 'lsiodev/doplarr_rs'
  - PR_DOCKERHUB_IMAGE = 'lspipepr/doplarr_rs'
  - DIST_IMAGE = 'alpine'
  - MULTIARCH='true'
  - CI='true'
  - CI_WEB='false'
  - CI_PORT=''
  - CI_SSL='false'
  - CI_DELAY='120'
  - CI_DOCKERENV=''
  - CI_AUTH=''
  - CI_WEBPATH=''
sponsor_links:
  - { name: "activexray", url: "https://github.com/sponsors/activexray" }
