---
# project information
project_name: doplarr_rs
project_url: "https://github.com/activexray/doplarr_rs"
project_logo: "https://raw.githubusercontent.com/linuxserver/docker-templates/master/linuxserver.io/img/doplarr_rs-logo_title.png"
project_blurb: |
  [{{ project_name|capitalize }}]({{ project_url }}) is a Discord bot for requesting media through *arr backends, written in Rust.."
project_lsio_github_repo_url: "https://github.com/linuxserver/docker-{{ project_name }}"
project_categories: "Media Requesters"
# supported architectures
available_architectures:
  - { arch: "{{ arch_x86_64 }}", tag: "amd64-latest" }
  - { arch: "{{ arch_arm64 }}", tag: "arm64v8-latest" }
# container parameters
common_param_env_vars_enabled: true
param_container_name: "{{ project_name }}"
param_usage_include_env: false
param_env_vars:

param_usage_include_vols: true
param_volumes:
  - {
      vol_path: "/config",
      vol_host_path: "/path/to/{{ project_name }}/config",
      desc: "Persistent config files",
    }
# optional container parameters
opt_param_usage_include_env: false
opt_param_env_vars:

readonly_supported: true
nonroot_supported: true
# application setup block
app_setup_block_enabled: true
app_setup_block: |
  Start by following the [Setup](https://github.com/activexray/doplarr_rs#setup) instructions from doplarr_rs's readme.

  The `config.toml` file is created from `config.example.toml` on first run, so you can start the container with the default config file and then stop it to edit the generated `config.toml` file.

# init diagram
init_diagram: |
  "doplarr_rs:latest": {
    docker-mods
    base {
      fix-attr +\nlegacy cont-init
    }
    docker-mods -> base
    legacy-services
    custom services
    init-services -> legacy-services
    init-services -> custom services
    custom services -> legacy-services
    legacy-services -> ci-service-check
    init-migrations -> init-adduser
    init-os-end -> init-config
    init-config -> init-config-end
    init-crontab-config -> init-config-end
    init-doplarr_rs-config -> init-config-end
    init-config -> init-crontab-config
    init-mods-end -> init-custom-files
    init-adduser -> init-device-perms
    init-config -> init-doplarr_rs-config
    base -> init-envfile
    base -> init-migrations
    init-config-end -> init-mods
    init-mods-package-install -> init-mods-end
    init-mods -> init-mods-package-install
    init-adduser -> init-os-end
    init-device-perms -> init-os-end
    init-envfile -> init-os-end
    init-custom-files -> init-services
    init-services -> svc-cron
    svc-cron -> legacy-services
    init-services -> svc-doplarr_rs
    svc-doplarr_rs -> legacy-services
  }
  Base Images: {
    "baseimage-alpine:3.24"
  }
  "doplarr_rs:latest" <- Base Images
# changelog
changelogs:
  - { date: "22.06.26:", desc: "Initial Release." }
